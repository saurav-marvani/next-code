dInput(path string) ([]byte, error) {","lineNumber":134,"offsetAndLengths":[[0,4]]},{"preview":"func loadSchema(path string) ([]byte, error) {","lineNumber":127,"offsetAndLengths":[[0,4]]},{"preview":"\t\tpath = filepath.Clean(filepath.Join(\"..\", \"plugins.d\", \"FUNCTION_UI_SCHEMA.json\"))","lineNumber":129,"offsetAndLengths":[[58,4]]},{"preview":"func isTopologyResponse(obj map[string]any) bool {","lineNumber":122,"offsetAndLengths":[[0,4]]},{"preview":"func validateJSON(schemaBytes, inputBytes []byte) (any, error) {","lineNumber":57,"offsetAndLengths":[[0,4]]}]},{"__typename":"FileMatch","repository":{"name":"github.com/BerriAI/litellm"},"file":{"path":"cookbook/gollem_go_agent_framework/tools/main.go","url":"/r/github.com/BerriAI/litellm/-/blob/cookbook/gollem_go_agent_framework/tools/main.go","content":"// Gollem agent with type-safe tools through LiteLLM.\n//\n// The tool parameters are Go structs — gollem generates the JSON schema\n// automatically at compile time. LiteLLM passes tool definitions through\n// transparently to the underlying provider.\n//\n// Usage:\n//\n//\tlitellm --model gpt-4o\n//\tgo run ./tools\npackage main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\t\"log\"\n\t\"os\"\n\n\t\"github.com/fugue-labs/gollem/core\"\n\t\"github.com/fugue-labs/gollem/provider/openai\"\n)\n\n// WeatherParams defines the tool''s input schema via struct tags.\n// The JSON schema is generated at compile time — no runtime reflection needed.\ntype WeatherParams struct {\n\tCity string `json:\"city\" description:\"City name to get weather for\"`\n\tUnit string `json:\"unit,omitempty\" description:\"Temperature unit: celsius or fahrenheit\"`\n}\n\nfunc main() {\n\tproxyURL := \"http://localhost:4000\"\n\tif u := os.Getenv(\"LITELLM_PROXY_URL\"); u != \"\" {\n\t\tproxyURL = u\n\t}\n\n\tmodel := openai.NewLiteLLM(proxyURL,\n\t\topenai.WithModel(\"gpt-4o\"),\n\t)\n\n\t// Define a type-safe tool. The function signature enforces correct types.\n\tweatherTool := core.FuncTool[WeatherParams](\n\t\t\"get_weather\",\n\t\t\"Get current weather for a city\",\n\t\tfunc(ctx context.Context, p WeatherParams) (string, error) {\n\t\t\tunit := p.Unit\n\t\t\tif unit == \"\" {\n\t\t\t\tunit = \"fahrenheit\"\n\t\t\t}\n\t\t\t// In production, call a real weather API here.\n\t\t\treturn fmt.Sprintf(\"Weather in %s: 72°F (22°C), sunny\", p.City), nil\n\t\t},\n\t)\n\n\tagent := core.NewAgent[string](model,\n\t\tcore.WithTools[string](weatherTool),\n\t\tcore.WithSystemPrompt[string](\"You are a helpful weather assistant. Use the get_weather tool to answer weather questions.\"),\n\t)\n\n\tresult, err := agent.Run(context.Background(), \"What''s the weather like in San Francisco and Tokyo?\")\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\tfmt.Println(result.Output)\n}\n"},"lineMatches":[{"preview":"func main() {","lineNumber":29,"offsetAndLengths":[[0,9]]},{"preview":"package main","lineNumber":10,"offsetAndLengths":[[8,4]]},{"preview":"\t// Define a type-safe tool. The function signature enforces correct types.","lineNumber":39,"offsetAndLengths":[[33,4]]},{"preview":"\tweatherTool := core.FuncTool[WeatherParams](","lineNumber":40,"offsetAndLengths":[[21,4]]},{"preview":"\t\tfunc(ctx context.Context, p WeatherParams) (string, error) {","lineNumber":43,"offsetAndLengths":[[2,4]]}]},{"__typename":"FileMatch","repository":{"name":"github.com/netdata/netdata"},"file":{"path":"src/go/tools/topology-oui-dataset/main.go","url":"/r/github.com/netdata/netdata/-/blob/src/go/tools/topology-oui-dataset/main.go","content":"// SPDX-License-Identifier: GPL-3.0-or-later\n\npackage main\n\nimport (\n\t\"bufio\"\n\t\"encoding/csv\"\n\t\"flag\"\n\t\"fmt\"\n\t\"io\"\n\t\"net/http\"\n\t\"os\"\n\t\"regexp\"\n\t\"sort\"\n\t\"strings\"\n\t\"time\"\n)\n\ntype ieeeSource struct {\n\tname string\n\turl  string\n}\n\nvar ieeeSources = []ieeeSource{\n\t{name: \"ieee_oui\", url: \"https://standards-oui.ieee.org/oui/oui.csv\"},\n\t{name: \"ieee_cid\", url: \"https://standards-oui.ieee.org/cid/cid.csv\"},\n\t{name: \"ieee_oui36\", url: \"https://standards-oui.ieee.org/oui36/oui36.csv\"},\n\t{name: \"ieee_iab\", url: \"https://standards-oui.ieee.org/iab/iab.csv\"},\n}\n\nvar nonHex = regexp.MustCompile(`[^0-9A-Fa-f]`)\nvar httpClient = \u0026http.Client{Timeout: 30 * time.Second}\n\nfunc main() {\n\tvar outputPath string\n\tflag.StringVar(\u0026outputPath, \"out\", \"\", \"output TSV path (required)\")\n\tflag.Parse()\n\n\tif strings.TrimSpace(outputPath) == \"\" {\n\t\tfmt.Fprintln(os.Stderr, \"missing required -out argument\")\n\t\tos.Exit(2)\n\t}\n\n\tindex, err := buildVendorIndex()\n\tif err != nil {\n\t\tfmt.Fprintf(os.Stderr, \"failed to build OUI index: %v\\n\", err)\n\t\tos.Exit(1)\n\t}\n\tif err := writeDataset(outputPath, index); err != nil {\n\t\tfmt.Fprintf(os.Stderr, \"failed to write dataset: %v\\n\", err)\n\t\tos.Exit(1)\n\t}\n\tfmt.Printf(\"wrote %d entries to %s\\n\", len(index), outputPath)\n}\n\nfunc buildVendorIndex() (map[string]string, error) {\n\tprefixToVendor := make(map[string]string, 120000)\n\n\tfor _, src := range ieeeSources {\n\t\trecords, err := fetchCSV(src.url)\n\t\tif err != nil {\n\t\t\treturn nil, fmt.Errorf(\"%s: %w\", src.name, err)\n\t\t}\n\t\tfor i, record := range records {\n\t\t\tif i == 0 { // header\n\t\t\t\tcontinue\n\t\t\t}\n\t\t\tif len(record) \u003c 3 {\n\t\t\t\tcontinue\n\t\t\t}\n\t\t\tregistry := strings.TrimSpace(record[0])\n\t\t\tassignment := normalizeAssignment(record[1])\n\t\t\tvendor := strings.TrimSpace(record[2])\n\t\t\tif assignment == \"\" || vendor == \"\" {\n\t\t\t\tcontinue\n\t\t\t}\n\t\t\tprefixLen := prefixLengthForRegistry(registry, assignment)\n\t\t\tif prefixLen == 0 || len(assignment) \u003c prefixLen {\n\t\t\t\tcontinue\n\t\t\t}\n\t\t\tprefix := assignment[:prefixLen]\n\n\t\t\tif existing, ok := prefixToVendor[prefix]; ok {\n\t\t\t\t// Prefer the more descriptive name on conflicts.\n\t\t\t\tif len(existing) \u003e= len(vendor) {\n\t\t\t\t\tcontinue\n\t\t\t\t}\n\t\t\t}\n\t\t\tprefixToVendor[prefix] = vendor\n\t\t}\n\t}\n\treturn prefixToVendor, nil\n}\n\nfunc fetchCSV(url string) ([][]string, error) {\n\treq, err := http.NewRequest(http.MethodGet, url, nil)\n\tif err != nil {\n\t\treturn nil, err\n\t}\n\treq.Header.Set(\"User-Agent\", \"netdata-topology-oui-dataset-updater/1.0\")\n\n\tresp, err := httpClient.Do(req)\n\tif err != nil {\n\t\treturn nil, err\n\t}\n\tdefer resp.Body.Close()\n\n\tif resp.StatusCode != http.StatusOK {\n\t\treturn nil, fmt.Errorf(\"unexpected status %d\", resp.StatusCode)\n\t}\n\n\treader := csv.NewReader(resp.Body)\n\treader.FieldsPerRecord = -1\n\trecords := make([][]string, 0, 65536)\n\tfor {\n\t\trecord, err := reader.Read()\n\t\tif err == io.EOF {\n\t\t\tbreak\n\t\t}\n\t\tif err != nil {\n\t\t\treturn nil, err\n\t\t}\n\t\trecords = append(records, record)\n\t}\n\treturn records, nil\n}\n\nfunc normalizeAssignment(raw string) string {\n\traw = strings.TrimSpace(raw)\n\traw = nonHex.ReplaceAllString(raw, \"\")\n\traw = strings.ToUpper(raw)\n\tif len(raw) \u003e 12 {\n\t\traw = raw[:12]\n\t}\n\treturn raw\n}\n\nfunc prefixLengthForRegistry(registry, assignment string) int {\n\tswitch strings.ToUpper(strings.TrimSpace(registry)) {\n\tcase \"MA-S\", \"IAB\":\n\t\tif len(assignment) \u003e= 9 {\n\t\t\treturn 9\n\t\t}\n\tcase \"MA-M\":\n\t\tif len(assignment) \u003e= 7 {\n\t\t\treturn 7\n\t\t}\n\tcase \"MA-L\", \"CID\":\n\t\tif len(assignment) \u003e= 6 {\n\t\t\treturn 6\n\t\t}\n\t}\n\t// Fallback for non-standard/unknown registry values.\n\tif len(assignment) \u003e= 9 {\n\t\treturn 9\n\t}\n\tif len(assignment) \u003e= 7 {\n\t\treturn 7\n\t}\n\tif len(assignment) \u003e= 6 {\n\t\treturn 6\n\t}\n\treturn 0\n}\n\nfunc writeDataset(path string, index map[string]string) error {\n\tf, err := os.Create(path)\n\tif err != nil {\n\t\treturn err\n\t}\n\tdefer f.Close()\n\n\tw := bufio.NewWriterSize(f, 1\u003c\u003c20)\n\tdefer w.Flush()\n\n\tprefixes := make([]string, 0, len(index))\n\tfor prefix := range index {\n\t\tprefixes = append(prefixes, prefix)\n\t}\n\tsort.Slice(prefixes, func(i, j int) bool {\n\t\tif len(prefixes[i]) != len(prefixes[j]) {\n\t\t\treturn len(prefixes[i]) \u003e len(prefixes[j])\n\t\t}\n\t\treturn prefixes[i] \u003c prefixes[j]\n\t})\n\n\tfmt.Fprintf(w, \"# Netdata Topology OUI Vendor Dataset\\n\")\n\tfmt.Fprintf(w, \"# Generated: %s\\n\", time.Now().UTC().Format(time.RFC3339))\n\tfmt.Fprintf(w, \"# Sources:\\n\")\n\tfor _, src := range ieeeSources {\n\t\tfmt.Fprintf(w, \"# - %s %s\\n\", src.name, src.url)\n\t}\n\tfmt.Fprintf(w, \"# Format: \u003cHEX_PREFIX\u003e\\\\t\u003cVENDOR\u003e\\n\")\n\n\tfor _, prefix := range prefixes {\n\t\tfmt.Fprintf(w, \"%s\\t%s\\n\", prefix, index[prefix])\n\t}\n\treturn nil\n}\n"},"lineMatches":[{"preview":"func main() {","lineNumber":33,"offsetAndLengths":[[0,9]]},{"preview":"package main","lineNumber":2,"offsetAndLengths":[[8,4]]},{"preview":"\tsort.Slice(prefixes, func(i, j int) bool {","lineNumber":179,"offsetAndLengths":[[22,4]]},{"preview":"func normalizeAssignment(raw string) string {","lineNumber":127,"offsetAndLengths":[[0,4]]},{"preview":"func fetchCSV(url string) ([][]string, error) {","lineNumber":94,"offsetAndLengths":[[0,4]]},{"preview":"func buildVendorIndex() (map[string]string, error) {","lineNumber":55,"offsetAndLengths":[[0,4]]},{"preview":"func prefixLengthForRegistry(registry, assignment string) int {","lineNumber":137,"offsetAndLengths":[[0,4]]}]}]}}}}'
